<mat-toolbar color="primary">
    <span class="title-center">Pacijenti</span>
</mat-toolbar>

<div class="container mat-elevation-z8">
    <mat-form-field>
        <input matInput placeholder="Pretraga pacijenata" (keyup)="applyFilter($any($event.target).value)">
    </mat-form-field>
    <mat-table #table [dataSource]="dataSource" class="mat-cell" matSort>
        <ng-container matColumnDef="id">
            <mat-header-cell *matHeaderCellDef mat-sort-header>Id</mat-header-cell>
            <mat-cell *matCellDef="let row">{{ row.id }}</mat-cell>
        </ng-container>

        <ng-container matColumnDef="ime">
            <mat-header-cell *matHeaderCellDef mat-sort-header>Ime</mat-header-cell>
            <mat-cell *matCellDef="let row">{{ row.ime }}</mat-cell>
        </ng-container>

        <ng-container matColumnDef="osiguranje">
            <mat-header-cell *matHeaderCellDef mat-sort-header>Zdravstveno osiguranje:</mat-header-cell>
            <mat-cell *matCellDef="let row" [style.color]="row.zdrOsiguranje ? 'green' : 'red'">{{ row.zdrOsiguranje ? 'Da' : 'Ne' }}</mat-cell>
        </ng-container>

        <ng-container matColumnDef="datumRodjenja">
            <mat-header-cell *matHeaderCellDef mat-sort-header>Datum rođenja</mat-header-cell>
            <mat-cell *matCellDef="let row">
                {{ row.datumRodjenja | date: 'dd.MM.yyyy.' }}
            </mat-cell>
        </ng-container>

        <ng-container matColumnDef="dijagnoza">
            <mat-header-cell *matHeaderCellDef mat-sort-header>Dijagnoza</mat-header-cell>
            <mat-cell *matCellDef="let row">{{ row.dijagnoza?.naziv }}</mat-cell>
        </ng-container>

        <ng-container matColumnDef="odeljenje">
            <mat-header-cell *matHeaderCellDef mat-sort-header>Odeljenje ID</mat-header-cell>
            <mat-cell *matCellDef="let row">{{ row.odeljenje?.id }}</mat-cell>
        </ng-container>

        <ng-container matColumnDef="actions">
            <mat-header-cell *matHeaderCellDef>
                <button (click)="openDialog(1)" mat-icon-button color="primary">
                    <mat-icon>add</mat-icon>
                </button>
            </mat-header-cell>

            <mat-cell *matCellDef="let row; let i = index">
                <button (click)="openDialog(2, row.id, row.ime, row.zdrOsiguranje, row.datumRodjenja, row.odeljenje, row.dijagnoza)" 
                mat-icon-button color="primary">
                    <mat-icon aria-label="edit">edit</mat-icon>
                </button>

                <button (click)="openDialog(3, row.id, row.ime, row.zdrOsiguranje, row.datumRodjenja, row.odeljenje, row.dijagnoza)" mat-icon-button color="primary">
                    <mat-icon aria-label="delete">delete</mat-icon>
                </button>
            </mat-cell>
        </ng-container>

        <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
        <mat-row *matRowDef="let row; columns: displayedColumns"></mat-row>
    </mat-table>

    <div class="no-result" *ngIf="dataSource.data.length === 0">
        Nema pacijenata u ovom odeljenju.
    </div>
</div>
